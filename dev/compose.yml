services:
  gnome-test:
    image: lscr.io/linuxserver/webtop:ubuntu-gnome
    container_name: gnome-test
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      # Mount your source code
      - ./src:/home/abc/.local/share/gnome-shell/extensions/awesome-tiles@velitasali.com
      # Mount the dev script
      - ./dev.sh:/home/abc/dev.sh
    ports:
      - 3000:3000
      - 5900:5900
    # Install inotify-tools and run the dev script in the background
    entrypoint: >
      bash -c "
      apt-get update && apt-get install -y inotify-tools &&
      chmod +x /home/abc/dev.sh &&
      su abc -c '/home/abc/dev.sh &' &&
      /init"
